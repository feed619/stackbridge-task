services:
  backend:
    build: .
    volumes:
      - .:/Backend
    image: backend-api
    container_name: backend-api
    command: >
      bash -c "
      alembic upgrade head &&
      python seed_database.py &&
      uvicorn main:app --host 0.0.0.0 --port 8000"
    depends_on:
      - psql-db
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - app-network

  psql-db:
    image: postgres:latest
    container_name: psql-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5544:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    env_file:
      - .env
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge
